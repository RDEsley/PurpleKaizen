name: Keep Supabase Alive

on:
  schedule:
    # Rodar a cada 1 dias é suficiente; ajuste se preferir mais frequência.
    - cron: "0 0 */1 * *" # a cada 1 dias
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Missing SUPABASE_URL secret."
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] && [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_SERVICE_ROLE_KEY (recommended) or SUPABASE_ANON_KEY secret."
            exit 1
          fi

          # Default ping does NOT require any tables: GoTrue health endpoint.
          # You can override via repository Variables or Secrets.
          # - SUPABASE_PING_PATH (optional, Secret): full path override, ex "/auth/v1/health" or "/rest/v1/xyz?select=*&limit=1"
          # - SUPABASE_PING_TABLE (optional, Variable): if set, use PostgREST table ping
          # - SUPABASE_PING_SELECT (optional, Variable): columns for PostgREST ping (default: id)
          ping_path_default="/auth/v1/health"

          if [ -n "${SUPABASE_PING_PATH:-}" ]; then
            ping_path="${SUPABASE_PING_PATH}"
          elif [ -n "${SUPABASE_PING_TABLE:-}" ]; then
            table="${SUPABASE_PING_TABLE}"
            select_cols="${SUPABASE_PING_SELECT:-id}"
            ping_path="/rest/v1/${table}?select=${select_cols}&limit=1"
          else
            ping_path="${ping_path_default}"
          fi
          ping_path="${ping_path#/}" # prevent double slashes
          url="${SUPABASE_URL%/}/${ping_path}"

          # Prefer service role for reliability (RLS can block anon SELECT).
          key="${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_ANON_KEY}}"
          echo "Pinging: ${url}"

          # Fail on non-2xx, retry transient errors, and print useful logs
          curl -sS -f \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --connect-timeout 10 --max-time 20 \
            -H "apikey: ${key}" \
            -H "Authorization: Bearer ${key}" \
            -H "Accept: application/json" \
            "${url}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PING_PATH: ${{ secrets.SUPABASE_PING_PATH }}
          SUPABASE_PING_TABLE: ${{ vars.SUPABASE_PING_TABLE }}
          SUPABASE_PING_SELECT: ${{ vars.SUPABASE_PING_SELECT }}
